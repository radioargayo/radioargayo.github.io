- name: El Pájaro Observador
  image: /assets/imgs/programas/pajaro.jpg
  link: /pajaro
  emision: 
    - dia: Miércoles
      hora: "01:00"
    - dia: Sábados
      hora: "17:00"
  redes:
    ivoox: https://www.ivoox.com/podcast-pajaro-observador_sq_f1614349_1.html
    facebook: https://www.facebook.com/ElPajaroObservador
    bluesky: https://bsky.app/profile/elpajaroobservador.bsky.social
    instagram: https://www.instagram.com/elpajaroobservador/
    youtube: https://www.youtube.com/channel/UCDSEPjqN2JE1b241NCzVktQ
  descripcion: |
    Un programa para **dar voz a las mujeres y los hombres olvidados.**

    A todas aquellas personas que no son escuchadas pero que tienen **mucho que decir y mucho que reivindicar en el actual contexto** tanto mundial como regional en el que nos encontramos.

    Cuando hablamos de los olvidados, hablamos de ella, hablamos de él y hablamos de ti.

    Contamos con todos vosotros y vosotras para formar parte de este proyecto y crecer juntos. **Queremos informar y ser informados.**

    Emitiendo desde un nido oculto en algún salvaje bosque de Cantabria.

