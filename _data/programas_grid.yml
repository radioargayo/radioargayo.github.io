- name: La Tertulia de las Comadres
  image: /assets/imgs/programas/tertulia.jpg
  link: /tertulia
  emision: 
    - dia: Viernes
      hora: "13:30"
    - dia: Domingos
      hora: "17:00"
  redes:
    ivoox: https://www.ivoox.com/podcast-tertulia-comadres_sq_f11170477_1.html
    facebook: https://www.facebook.com/tertuliacomadres
  descripcion: >
    ¿**Dónde** se han resuelto a lo largo de los tiempos los problemas que afectaban a las **mujeres de las comunidades**?

    ¿**En qué lugares** se juntaban los afectos, ternuras y complicidades entre **niñas y adultas mayores**? 

    Iniciamos este viaje radiofónico, para poner en valor **palabras y voces femeninas, imprescindibles** en todos los espacios públicos necesarios. 

    Queremos que habiten las ondas **en formato de tertulia**.

    Porque **fueron**, somos.

    Porque hablaron, **hablamos entre comadres**.

