- name: Libroteca
  image: /assets/imgs/programas/libroteca.png
  link: /libroteca
  emision: 
    - dia: Miércoles
      hora: "20:00"
  redes:
    ivoox: https://www.ivoox.com/podcast-libroteca-historias-librerias-bibliotecas_sq_f1926133_1.html
    instagram: https://www.instagram.com/podcastlibroteca/
  descripcion: |
    Se buscan **librerías y bibliotecas de todo el mundo que quieran contar su propia historia** y las de la comunidad que crean en torno a ellas.

    Así, acabaremos hablando de personas y personajes, curiosidades y anécdotas, hechos históricos y ficciones... pero **siempre buscando a esas mujeres menos conocidas que forman parte de esas historias colectivas**. 

    Para ello, además del podcast, tienes su blog [podcastlibroteca.es](http://podcastlibroteca.es/), donde poder ver las imágenes de las librerías y las bibliotecas, poner cara a las mujeres de las que se hablan y por supuesto, ver las fuentes de lo que se cuenta.

    Se admiten contrastes a la información y sugerencias de lugares que merecen la pena descubrir.

